       { id: 44, q: "下列何者屬於「軟實力」？", options: ["(A) 糧食儲備", "(B) 兵器多寡", "(C) 運籌帷幄", "(D) 兵員數量"] },
       { id: 45, q: "〈作戰篇〉對吾人的啟示，下列論述何者有誤？", options: ["(A) 戰爭的目的是勝，不是久，故打法「寧拙毋巧」是可以接受的", "(B) 勝，意味著打敗敵人，使敵人屈服於自己的意志", "(C) 為了避免過度消耗，無論何種情況，在戰略 or 戰術上，都必須速戰速決", "(D) 二戰時期，日軍侵華導致其國內民生凋敝，物質匱乏，是因其無法速戰速決所致"] }, 
       { id: 46, q: "將「911 恐攻」案例定義為「因糧於敵」的變體應用，其理由為何？", options: ["(A) 使用了敵方的飛機作為攻擊敵方的武器", "(B) 側反敵方情報人員滲透敵方情報系統，造成一定程度的損害", "(C) 駭入敵方的金融系統，接獲得敵方的經濟援助", "(D) 摧毀了敵方的首都與糧倉，打擊敵方士氣"] }
  ];

  let questions = [];
  let userAnswers = {};
  let currentIndex = 0;
  let startTime, endTime;
  let isSubmitted = false;
  let isQuizStarted = false; 

  // iOS 核心防護：時間戳記與心跳計時器
  let lastHeartbeatTime = Date.now();
  let heartbeatInterval = null;

  // =======================================================
  // 傳統防弊監聽（主要防 Android/PC）
  // =======================================================
  window.addEventListener("blur", () => {
    if (isQuizStarted && !isSubmitted) {
      triggerCheatDetection("偵測到您已離開考卷視窗！");
    }
  });

  document.addEventListener("visibilitychange", () => {
    if (isQuizStarted && !isSubmitted && document.visibilityState === 'hidden') {
      triggerCheatDetection("偵測到您已離開答題頁面！");
    }
  });

  // =======================================================
  // iOS 救星：心跳偵測（抓 JS 被系統凍結的時間差）
  // =======================================================
  function startHeartbeatCheck() {
      lastHeartbeatTime = Date.now();
      
      // 每 300 毫秒跳動一次
      heartbeatInterval = setInterval(() => {
          if (!isQuizStarted || isSubmitted) {
              clearInterval(heartbeatInterval);
              return;
          }
          
          const currentTime = Date.now();
          const timePassed = currentTime - lastHeartbeatTime;
          
          // 正常情況下 timePassed 應該接近 300ms
          // 如果大於 1200ms (1.2秒)，代表 JS 執行緒曾被 iOS 系統強行凍結（即學生拉出選單、切換 App、或截圖）
          if (timePassed > 1200) {
              clearInterval(heartbeatInterval);
              triggerCheatDetection("偵測到系統中斷（可能原因：拉出控制/通知中心、切換 App 或使用系統截圖）。");
              return;
          }
          
          lastHeartbeatTime = currentTime;
      }, 300);
  }

  function triggerCheatDetection(reason) {
      if (isSubmitted) return;
      alert(`🚨 舞弊警告：${reason}\n系統已立即終止測驗並強制交卷！`);
      finishQuiz();
  }

  function nextPage(targetId) {
      const pages = document.getElementsByClassName('page');
      for (let i = 0; i < pages.length; i++) {
          pages[i].style.display = 'none';
      }
      document.getElementById(targetId).style.display = 'block';
  }

  function uploadToGoogleForm(cls, id, name, sTime, eTime) {
      const formActionURL = "https://docs.google.com/forms/d/e/1FAIpQLScK089NfPbM3CmQ6VOkPJShLFUF8IUMRWQQCDsjhwd_Cuzjfg/formResponse";
      let finalAnsList = [];
      for (let currentId = 1; currentId <= 46; currentId++) {
          let foundIdx = questions.findIndex(q => q.id === currentId);
          let selectedOptIdx = (foundIdx !== -1 && userAnswers[foundIdx] !== undefined) ? userAnswers[foundIdx] : -1;
          finalAnsList.push(`${currentId}:${selectedOptIdx}`);
      }
      const encodedAnswers = finalAnsList.join(",");
      const formData = new FormData();
      formData.append("entry.1701110363", cls);
      formData.append("entry.562469036", id);
      formData.append("entry.396393197", name);
      formData.append("entry.1143918102", encodedAnswers);
      formData.append("entry.990500050", sTime);
      formData.append("entry.83330138", eTime);

      fetch(formActionURL, { method: "POST", mode: "no-cors", body: formData })
      .then(() => { document.getElementById('statusMsg').innerText = "✅ 測驗結果已成功傳送至雲端。"; })
      .catch(() => { alert("傳送失敗，請確認網路連線！"); });
  }

  function finishQuiz() {
      if (isSubmitted) return;
      isSubmitted = true;
      isQuizStarted = false; 
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      endTime = new Date();
      nextPage('page4');
      const formatTime = (date) => date.toTimeString().split(' ')[0];
      const cls = document.getElementById('class').value || "未填";
      const id = document.getElementById('id').value || "未填";
      const name = document.getElementById('name').value || "未填";
      document.getElementById('resultInfo').innerHTML = `<p>班級：${cls}</p><p>學號：${id}</p><p>姓名：${name}</p><p>結束時間：${formatTime(endTime)}</p>`;
      uploadToGoogleForm(cls, id, name, formatTime(startTime), formatTime(endTime));
  }

  document.getElementById('btnToPage2').addEventListener('click', () => nextPage('page2'));
  
  document.getElementById('btnStartQuiz').addEventListener('click', () => {
      const passwordInput = prompt("請輸入今日考試通關密碼：");
      if (passwordInput !== "因利制權") {
          alert("密碼錯誤");
          return;
      }
      
      startTime = new Date();
      questions = [...rawQuestions].sort(() => Math.random() - 0.5);
      nextPage('page3');
      renderQuestion();

      // 密碼關閉 1 秒後，同時開起傳統監聽與 iOS 心跳監聽
      setTimeout(() => {
          isQuizStarted = true;
          startHeartbeatCheck();
      }, 1000);
  });

  function renderQuestion() {
      const q = questions[currentIndex];
      const container = document.getElementById('questionContainer');
      
      container.innerHTML = `<div>第 ${currentIndex + 1}/${questions.length} 題：${q.q}</div>`;
      
      q.options.forEach((opt, idx) => {
          const div = document.createElement('div');
          div.className = 'option ' + (userAnswers[currentIndex] === idx ? 'selected' : '');
          div.textContent = opt;
          div.onclick = () => { userAnswers[currentIndex] = idx; renderQuestion(); };
          container.appendChild(div);
      });

      document.getElementById('prevBtn').onclick = () => { if(currentIndex>0){currentIndex--; renderQuestion();} };
      document.getElementById('nextBtn').onclick = () => { if(currentIndex<questions.length-1){currentIndex++; renderQuestion();} };
      
      if (currentIndex === questions.length - 1) {
          document.getElementById('nextBtn').style.display = 'none';
          document.getElementById('submitBtn').style.display = 'block';
          document.getElementById('submitBtn').onclick = finishQuiz;
      } else {
          document.getElementById('nextBtn').style.display = 'block';
          document.getElementById('submitBtn').style.display = 'none';
      }
  }

  // 其他防作弊底層機制
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('copy', (e) => e.preventDefault());
  document.addEventListener('selectionchange', () => {
      if (isQuizStarted && !isSubmitted) {
          const selection = window.getSelection();
          if (selection.toString().trim() !== "") {
              selection.removeAllRanges(); 
          }
      }
  });
})();
</script>
</body>
</html>
